services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: commonplace-postgres
    environment:
      POSTGRES_USER: commonplace
      POSTGRES_PASSWORD: commonplace
      POSTGRES_DB: commonplace
    ports:
      # 5433 on the host: many dev machines already run a postgres on 5432
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U commonplace"]
      interval: 5s
      timeout: 3s
      retries: 10

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    container_name: commonplace-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686" # Jaeger UI
      - "4318:4318" # OTLP HTTP

volumes:
  pgdata:
